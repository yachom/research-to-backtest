# 표준계정 Registry (README §12.2)
#
# Milestone 5(B3) 완료 조건인 11개 자동 매핑 대상 계정의 초안이다.
# accepted_concepts의 XBRL 표준계정 ID는 실제 공시 데이터로 검증하기 전의
# 초안이며, A4·B3에서 SK하이닉스 실데이터 기준으로 검증·확장한다.

